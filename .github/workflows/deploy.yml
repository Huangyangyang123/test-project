name: Deploy Node + Vue + AI Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            source ~/.bashrc

            cd /root/myproject/test-project

            git fetch --all
            git reset --hard origin/main

            npm install
            npm run build

            cd server
            npm install

            pm2 restart node-server || pm2 start server.js --name node-server