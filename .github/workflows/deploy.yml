name: Deploy to Production

on:
  push:
    branches:
      - main  # 只有 push 到 main 分支才会触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 设置 Node 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ 安装依赖和 build 前端
      - name: Install dependencies
        run: |
          npm install
          npm run build

      # 4️⃣ SSH 到服务器部署
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}      # 服务器 IP 或域名
          username: root                        # 之前确认是 root
          key: ${{ secrets.DEPLOY_SSH_KEY }}    # 我们刚才添加的私钥
          port: 22
          script: |
            cd /root/myproject/test-project     # 你的生产目录
            git pull origin main             # 更新代码
            npm install
            npm run build
            pm2 restart node-server || pm2 start server.js --name node-server