name: Deploy Node + Vue + AI Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            # 加载环境变量
            source ~/.bashrc

            # 进入项目目录
            cd /root/myproject/test-project

            # 拉取最新代码
            git pull origin main

            # 安装前端依赖并构建生产文件
            npm install
            npm run build

            # 进入后端目录启动 Node 服务
            cd server
            pm2 restart node-server || pm2 start serve.js --name node-server