name: Deploy Node + Vue + AI Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            source ~/.bashrc

            cd /root/myproject/test-project

            git fetch --all
            git reset --hard origin/main

            npm install
            npm run build

            # 后端目录
            cd server
            npm install

            # 清理旧 pm2 进程，启动最新 server.js
            pm2 describe node-server > /dev/null 2>&1 \
              && pm2 delete node-server
            pm2 start server.js --name node-server
            pm2 save