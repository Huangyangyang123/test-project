name: Deploy Node + Vue Application

# 触发条件：push 到 main 或手动触发
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ SSH 登录阿里云 ECS 部署
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}         # ECS 公网 IP
          username: root                           # 登录用户名
          key: ${{ secrets.DEPLOY_SSH_KEY }}      # SSH 私钥
          port: 22
          script: |
            echo "进入项目目录"
            cd /root/myproject/test-project || mkdir -p /root/myproject/test-project && cd /root/myproject/test-project

            echo "重置代码，确保覆盖旧版本"
            git fetch --all
            git reset --hard origin/main
            git clean -fd

            echo "安装前端依赖并构建生产文件"
            npm install
            npm run build

            echo "进入后端 server 目录"
            cd server
            npm install

            echo "停止旧 pm2 服务，删除旧进程"
            pm2 stop node-server || true
            pm2 delete node-server || true

            echo "启动 Node 服务"
            pm2 start server.js --name node-server
            pm2 save

            echo "部署完成 ✅"